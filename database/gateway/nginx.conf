# Nginx site configuration for db.usa-graphene.com
server {
    listen 80;
    server_name db.usa-graphene.com;

    # Root directory for Adminer
    root /var/www/html;
    index index.php index.html;

    # 1. Access to Adminer UI
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php-fpm.sock; # Will be set up by the deploy script
        
        # Simple Nginx Basic Auth for the Login page
        # auth_basic "Adminer Access";
        # auth_basic_user_file /etc/nginx/.htpasswd;
    }

    # 2. Proxy to PostgREST (The REST API Gateway)
    location / {
        # Check if it's a request for the API
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
